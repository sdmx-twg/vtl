name: "Build the docs"

on:
  workflow_dispatch:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ develop ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-index:
    name: build-index
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sdmx-twg/vtl-ci:latest
    needs: build-manuals
    if: ${{ !contains(github.event.head_commit.message, '#no-gha') }}
    env:
      PIP_CACHE_DIR: /tmp/.cache/pip

    steps:
      - uses: actions/checkout@v6

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: /tmp/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          curl -L -o /tmp/plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2025.9/plantuml-1.2025.9.jar

      - name: Sphinx build index
        run: |
          . .venv/bin/activate
          sphinx-build -M html docs outputdir/
          mv outputdir/html/* outputdir/

      - name: Download manuals artifacts (html + pdf)
        uses: actions/download-artifact@v4
        with:
          pattern: v*
          path: outputdir

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputdir

  build-manuals:
    name: build-manuals
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sdmx-twg/vtl-ci:latest
    if: ${{ !contains(github.event.head_commit.message, '#no-gha') }}

    strategy:
      matrix:
        version: [ "2.1", "2.2", "2.3" ]

    env:
      PIP_CACHE_DIR: /tmp/.cache/pip

    steps:
      - uses: actions/checkout@v6

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: /tmp/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          curl -L -o /tmp/plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2025.9/plantuml-1.2025.9.jar

      - name: Validate example fixtures (JSON vs CSV)
        env:
          DOC_VERSION: v${{ matrix.version }}
        run: python3 scripts/validate_example_fixtures.py

      - name: Build html & pdf v${{ matrix.version }}
        run: |
          . .venv/bin/activate
          sphinx-build -M html v${{ matrix.version }}/docs outputdir/${{ matrix.version }}/
          sphinx-build -b pdf v${{ matrix.version }}/docs outputdir/${{ matrix.version }}/html/pdf/
          find outputdir/${{ matrix.version }}/html/pdf/ -name '*.pdf' -exec mv "{}" outputdir/${{ matrix.version }}/html/VTL_${{ matrix.version }}_DOCS.pdf \; -quit

      - name: Upload docs for v${{ matrix.version }}
        uses: actions/upload-artifact@v7
        with:
          name: v${{ matrix.version }}
          if-no-files-found: error
          path: |
            outputdir/${{ matrix.version }}/html
            !outputdir/${{ matrix.version }}/html/pdf

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-index
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'master' && !contains(github.event.head_commit.message, '#no-gha') }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
