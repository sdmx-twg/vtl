name: Build VTL CI image

on:
  push:
    branches: [develop]
    paths:
      - .github/workflows/build-ci-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (optional)
        uses: actions/checkout@v4

      - name: Write embedded Dockerfile
        run: |
          mkdir -p .ci-image
          cat > .ci-image/Dockerfile << 'EOF'
          FROM ubuntu:latest
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && apt-get install -y python3 python3-venv libmpc-dev \
                libgmp-dev libmpfr-dev python3-pip graphviz openjdk-21-jdk \
                libjpeg-dev zlib1g-dev libxml2-dev libxslt-dev libfreetype6-dev \
                pkg-config git curl libcairo2-dev ca-certificates maven \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /work
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .ci-image
          file: .ci-image/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vtl-ci:latest

      - name: Keep only the newest container version
        uses: actions/delete-package-versions@v5
        with:
          package-name: vtl-ci
          package-type: container
          min-versions-to-keep: 1
          delete-only-untagged-versions: 'false'
